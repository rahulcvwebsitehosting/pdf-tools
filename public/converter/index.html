<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>File Converter - PDF Tools</title>
  <meta name="theme-color" content="#ff6d00"/>
  <script type="module" crossorigin src="/converter/assets/index-CJ4yun8B.js"></script>
  <link rel="stylesheet" crossorigin href="/converter/assets/index-CBlhhitq.css">
</head>
<body>
  <input id="file-input" type="file" multiple>
  <a id="commit-id" href="https://github.com/p2r3/convert"></a>

  <div class="app">
    <header class="header">
      <div class="header-inner">
        <a href="/" class="logo">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
            <polyline points="10 9 9 9 8 9"/>
          </svg>
          File Converter
        </a>
        <div class="header-actions">
          <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
            <svg id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:none">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/>
              <line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
              <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/>
              <line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
              <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
            <svg id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <main class="main">
      <div class="drop-zone" id="drop-zone">
        <svg class="drop-zone-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="17 8 12 3 7 8"/>
          <line x1="12" y1="3" x2="12" y2="15"/>
        </svg>
        <h2 class="drop-zone-title">Drop your file here</h2>
        <p class="drop-zone-hint">or click to browse</p>
        <button class="drop-zone-btn" id="browse-btn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
            <polyline points="17 8 12 3 7 8"/>
            <line x1="12" y1="3" x2="12" y2="15"/>
          </svg>
          Choose File
        </button>
        <div class="file-preview" id="file-preview">
          <svg class="file-preview-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <div class="file-preview-info">
            <div class="file-preview-name" id="file-name"></div>
            <div class="file-preview-meta" id="file-meta"></div>
          </div>
          <button class="file-preview-remove" id="file-remove" aria-label="Remove file">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="18" y1="6" x2="6" y2="18"/>
              <line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="conversion-panel" id="from-panel">
        <div class="panel-header">
          <h3 class="panel-title">Convert from</h3>
          <button class="mode-toggle" id="mode-toggle">Simple mode</button>
        </div>
        <input type="text" class="search-input" id="search-from" placeholder="Search formats...">
        <div class="format-grid" id="from-grid"></div>
      </div>

      <div class="conversion-panel" id="to-panel">
        <h3 class="panel-title">Convert to</h3>
        <input type="text" class="search-input" id="search-to" placeholder="Search formats...">
        <div class="format-grid" id="to-grid"></div>
      </div>

      <button class="convert-btn" id="convert-btn" disabled>Convert</button>
    </main>
  </div>

  <div class="popup-overlay" id="popup-overlay">
    <div class="popup">
      <div class="popup-icon" id="popup-icon"></div>
      <h2 class="popup-title" id="popup-title"></h2>
      <p class="popup-message" id="popup-message"></p>
      <p class="popup-path" id="popup-path"></p>
      <button class="popup-btn" id="popup-btn" style="display:none"></button>
    </div>
  </div>

  <div class="toast" id="toast">
    <svg class="toast-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/>
      <path d="M12 8v4M12 16h.01"/>
    </svg>
    <span class="toast-message" id="toast-message"></span>
  </div>

</body>
</html>
